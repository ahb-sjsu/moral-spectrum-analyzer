name: Release

# Publishes to PyPI on a version tag via Trusted Publishing (OIDC) — no stored token.
# One-time setup on PyPI: add a Trusted Publisher for project `moral-spectrum-analyzer`,
# owner `ahb-sjsu`, repo `moral-spectrum-analyzer`, workflow `release.yml`, environment `pypi`.
# Then: git tag vX.Y.Z && git push --tags   (tag version must match pyproject `version`).

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade pip build
          python -m build
      - name: Check metadata
        run: |
          pip install twine
          twine check dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write  # required for Trusted Publishing (OIDC)
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
